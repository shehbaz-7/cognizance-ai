name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  # Optional: allow manual trigger
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Wait for the build.yml to succeed ideally, or just do it here
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: Execute deployment on EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          # Variables
          REGION="${{ env.AWS_REGION }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}"
          
          # Auth Docker to ECR
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_URI
          
          # Pull latest image
          docker pull $ECR_URI:latest
          
          # Stop and remove existing container if it exists
          docker stop cognizance-app || true
          docker rm cognizance-app || true
          
          # Run new container
          # Passing the secrets manager env vars if needed, or rely on IAM role
          docker run -d \
            --name cognizance-app \
            --restart unless-stopped \
            -p 80:3000 \
            --log-driver=awslogs \
            --log-opt awslogs-region=$REGION \
            --log-opt awslogs-group=/cognizance/application/prod \
            --log-opt awslogs-stream=app-container \
            --log-opt awslogs-create-group=true \
            -e DB_SECRET_NAME="${{ secrets.DB_SECRET_NAME }}" \
            -e APP_CONFIG_SECRET_NAME="${{ secrets.APP_CONFIG_SECRET_NAME }}" \
            -e AWS_REGION=$REGION \
            $ECR_URI:latest
            
          # Verify running
          sleep 5
          docker ps | grep cognizance-app
